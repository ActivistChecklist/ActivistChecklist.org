name: Hide untranslatable strings in Crowdin

on:
  push:
    branches: [main]
    paths:
      - "content/**"

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      delay_minutes:
        description: "Minutes to wait for Crowdin sync"
        default: "3"
        type: string

concurrency:
  group: crowdin-hide-strings
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hide_strings:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Wait for Crowdin to sync
        run: |
          DELAY="${{ inputs.delay_minutes || '3' }}"
          echo "Waiting ${DELAY} minutes for Crowdin to pick up new files..."
          sleep "${DELAY}m"

      - name: Hide untranslatable strings
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
        run: node scripts/crowdin-hide-strings.mjs --apply
