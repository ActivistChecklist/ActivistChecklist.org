name: PR Checks (tests + static export)

on:
  pull_request:

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr_checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-cache-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ hashFiles('next.config.js', 'package.json', 'postcss.config.js', 'tailwind.config.js', 'app/**', 'components/**', 'lib/**', 'styles/**', 'content/**', 'messages/**') }}
          restore-keys: |
            next-cache-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-

      - name: Yarn install
        run: yarn install --frozen-lockfile --production=false

      - name: Unit tests
        run: yarn test

      - name: Static export build (production path)
        env:
          CHECKBUILD_URL_APPROVAL: allow
          BUILD_MODE: static
          NEXT_TELEMETRY_DISABLED: 1
        run: yarn buildstatic

